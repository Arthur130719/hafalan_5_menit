<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafalan Cepat dalam 5 Menit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Hafalan Cepat dalam 5 Menit</h1>
        
        <!-- Mode Input -->
        <div id="inputMode" class="mode-section">
            <p>Masukkan kalimat yang ingin Anda hafal:</p>
            <textarea id="inputText" placeholder="Masukkan kalimat di sini..."></textarea>
            <button id="startBtn" class="btn-primary">Mulai Hafalan</button>
        </div>
        
        <!-- Mode Hafalan -->
        <div id="halamanMode" class="mode-section hidden">
            <div class="timer-box">
                <p id="timer">5:00</p>
            </div>
            <div id="textDisplay" class="text-display"></div>
            <div id="instructions" class="instructions"></div>
            <button id="nextBtn" class="btn-secondary hidden">Lanjut ke Siklus Berikutnya</button>
        </div>
        
        <!-- Mode Recording -->
        <div id="recordingMode" class="mode-section hidden">
            <h2>Uji Hafalan Anda</h2>
            <p class="instruction-text">Tekan tombol dibawah dan ucapkan kalimat yang telah Anda pelajari:</p>
            <button id="recordBtn" class="btn-record">🎤 Mulai Rekam</button>
            <button id="stopBtn" class="btn-stop hidden">⏹ Berhenti</button>
            <div id="recordingIndicator" class="recording-indicator hidden">Merekam...</div>
            <div id="transcriptBox" class="transcript-box hidden">
                <p><strong>Hasil Rekaman Anda:</strong></p>
                <p id="transcript"></p>
            </div>
            <div id="resultBox" class="result-box hidden">
                <p id="resultText"></p>
                <p id="accuracyScore"></p>
            </div>
            <button id="retryBtn" class="btn-secondary hidden">Coba Lagi</button>
            <button id="finishBtn" class="btn-primary hidden">Selesai & Ulangi</button>
        </div>
        
        <!-- Hasil Akhir -->
        <div id="resultMode" class="mode-section hidden">
            <h2>📊 Hasil Hafalan</h2>
            <p id="finalResult"></p>
            <button id="restartBtn" class="btn-primary">Mulai Lagi</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
